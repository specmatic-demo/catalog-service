version: 3
systemUnderTest:
  service:
    $ref: "#/components/services/catalogService"
    runOptions:
      graphqlsdl:
        host: localhost
        port: 9000
components:
  sources:
    localSpecs:
      filesystem:
        directory: specs
  services:
    catalogService:
      description: "Catalog Service"
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localSpecs"
            specs:
              - spec:
                  path: "openapi.yaml"
              - spec:
                  path: "schema.graphql"
